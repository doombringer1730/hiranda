<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hiranda Watch Party</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* ── Hiranda roast palette ── */
      --roast-950: #0e0804;
      --roast-900: #1a1008;
      --roast-800: #2d1f0e;
      --roast-700: #3d2c14;
      --roast-600: #54391a;

      /* ── Amber accents ── */
      --amber-glow:  #c8842a;
      --amber-light: #e8a040;
      --amber-dim:   #8a5a1a;

      /* ── Parchment text ── */
      --parchment-100: #f5efe6;
      --parchment-200: #ede4d4;
      --parchment-300: #d9ccb8;
      --parchment-muted: #a08060;
      --parchment-dim:   #7a6045;

      /* ── Semantic ── */
      --base-green: #5fc695;
      --popup-width: 332px;
      --transition-time: 0.25s;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      max-width: var(--popup-width);
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--amber-glow) var(--roast-900);
    }

    body {
      -webkit-font-smoothing: antialiased;
      font-family: 'Inter', sans-serif;
      background-color: var(--roast-900);
      color: var(--parchment-100);
      width: var(--popup-width);
      min-height: 200px;
      position: relative;
    }

    /* Grain texture — matches Hiranda app */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.055;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='250' height='250'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='250' height='250' filter='url(%23n)'/></svg>");
      background-repeat: repeat;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background-color: var(--amber-glow); }

    /* Header */
    .hp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--roast-700);
    }

    .hp-logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hp-logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--amber-light), var(--amber-dim));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .hp-logo-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--amber-light), var(--amber-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hp-version {
      font-size: 11px;
      color: var(--parchment-muted);
    }

    /* Main content */
    #hp-content {
      padding: 20px;
    }

    /* Screens */
    .hp-screen { display: none; }
    .hp-screen.active { display: block; }

    /* Platform warning */
    #hp-unsupported {
      text-align: center;
      padding: 20px 0;
    }

    #hp-unsupported .hp-unsupported-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    #hp-unsupported p {
      font-size: 13px;
      color: var(--parchment-300);
      line-height: 1.5;
    }

    #hp-unsupported .hp-supported-list {
      margin-top: 12px;
      font-size: 12px;
      color: var(--parchment-muted);
    }

    /* No party screen */
    .hp-section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--parchment-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .hp-btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-time);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .hp-btn-primary {
      background: linear-gradient(135deg, var(--amber-light), var(--amber-glow));
      color: var(--roast-950);
    }

    .hp-btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .hp-btn-secondary {
      background: var(--roast-800);
      color: var(--parchment-100);
      border: 1px solid var(--roast-700);
    }

    .hp-btn-secondary:hover {
      background: var(--roast-700);
    }

    .hp-btn-danger {
      background: transparent;
      color: var(--amber-light);
      border: 1px solid var(--amber-glow);
    }

    .hp-btn-danger:hover {
      background: rgba(200, 132, 42, 0.12);
    }

    .hp-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px 0;
      color: var(--parchment-muted);
      font-size: 12px;
    }

    .hp-divider::before,
    .hp-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--roast-700);
    }

    .hp-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--roast-950);
      border: 1px solid var(--roast-700);
      border-radius: 8px;
      color: var(--parchment-100);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color var(--transition-time);
      margin-bottom: 10px;
    }

    .hp-input:focus {
      border-color: var(--amber-glow);
    }

    .hp-input::placeholder {
      color: var(--parchment-muted);
    }

    /* Party active screen */
    .hp-party-status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .hp-status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--base-green);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .hp-party-info {
      flex: 1;
    }

    .hp-party-label {
      font-size: 12px;
      color: var(--parchment-muted);
    }

    .hp-party-role {
      font-size: 13px;
      font-weight: 600;
      color: var(--parchment-100);
    }

    .hp-member-count {
      font-size: 12px;
      color: var(--parchment-300);
      background: var(--roast-800);
      padding: 4px 10px;
      border-radius: 12px;
    }

    /* Party link box */
    .hp-link-box {
      background: var(--roast-950);
      border: 1px solid var(--roast-700);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .hp-link-label {
      font-size: 11px;
      color: var(--parchment-muted);
      margin-bottom: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .hp-link-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hp-link-url {
      flex: 1;
      font-size: 12px;
      color: var(--parchment-300);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hp-copy-btn {
      background: var(--roast-700);
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--parchment-100);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background var(--transition-time);
      flex-shrink: 0;
    }

    .hp-copy-btn:hover { background: var(--roast-600); }
    .hp-copy-btn.copied { background: var(--base-green); color: #fff; }

    /* Code box */
    .hp-code-box {
      background: var(--roast-950);
      border: 1px solid var(--roast-700);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
      text-align: center;
    }

    .hp-code-label {
      font-size: 11px;
      color: var(--parchment-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .hp-code-value {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--amber-light), var(--amber-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Gap utility */
    .hp-gap { margin-bottom: 10px; }

    /* Error text */
    .hp-error {
      font-size: 12px;
      color: var(--amber-light);
      margin-top: 6px;
      min-height: 18px;
    }

    /* Loading spinner */
    .hp-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 0;
    }

    .hp-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--roast-700);
      border-top-color: var(--amber-glow);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="hp-header">
    <div class="hp-logo">
      <div class="hp-logo-icon">🎬</div>
      <span class="hp-logo-text">Hiranda</span>
    </div>
    <span class="hp-version">Watch Party</span>
  </div>

  <div id="hp-content">
    <!-- Loading -->
    <div id="screen-loading" class="hp-screen active">
      <div class="hp-loading">
        <div class="hp-spinner"></div>
      </div>
    </div>

    <!-- Unsupported page -->
    <div id="screen-unsupported" class="hp-screen">
      <div id="hp-unsupported">
        <div class="hp-unsupported-icon">🎬</div>
        <p>Open a supported streaming site to start or join a watch party.</p>
        <div class="hp-supported-list">
          Netflix · YouTube · Disney+ · Prime Video
        </div>
      </div>
    </div>

    <!-- No party active -->
    <div id="screen-noparty" class="hp-screen">
      <div class="hp-section-label">Start a watch party</div>
      <button class="hp-btn hp-btn-primary" id="btn-create">
        ▶ Start Party
      </button>

      <div class="hp-divider">or join with a code</div>

      <input
        class="hp-input"
        id="input-code"
        placeholder="Enter party code (e.g. ABC123)"
        maxlength="6"
        autocomplete="off"
        spellcheck="false"
      />
      <div class="hp-error" id="join-error"></div>
      <button class="hp-btn hp-btn-secondary" id="btn-join">
        Join Party
      </button>
    </div>

    <!-- Party active (host) -->
    <div id="screen-host" class="hp-screen">
      <div class="hp-party-status">
        <div class="hp-status-dot"></div>
        <div class="hp-party-info">
          <div class="hp-party-label">You are hosting</div>
          <div class="hp-party-role" id="host-member-label">Watch Party</div>
        </div>
        <div class="hp-member-count" id="host-member-count">1 member</div>
      </div>

      <div class="hp-code-box">
        <div class="hp-code-label">Party Code</div>
        <div class="hp-code-value" id="host-code">——</div>
      </div>

      <div class="hp-link-box">
        <div class="hp-link-label">Share Link</div>
        <div class="hp-link-row">
          <div class="hp-link-url" id="host-link">—</div>
          <button class="hp-copy-btn" id="btn-copy">Copy</button>
        </div>
      </div>

      <button class="hp-btn hp-btn-danger" id="btn-end">End Party</button>
    </div>

    <!-- Party active (guest) -->
    <div id="screen-guest" class="hp-screen">
      <div class="hp-party-status">
        <div class="hp-status-dot"></div>
        <div class="hp-party-info">
          <div class="hp-party-label">You are watching with</div>
          <div class="hp-party-role">Watch Party</div>
        </div>
        <div class="hp-member-count" id="guest-member-count">— members</div>
      </div>

      <div class="hp-code-box">
        <div class="hp-code-label">Party Code</div>
        <div class="hp-code-value" id="guest-code">——</div>
      </div>

      <div class="hp-gap"></div>
      <button class="hp-btn hp-btn-danger" id="btn-leave">Leave Party</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
